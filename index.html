<style>
  :root {

  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  .header{background:linear-gradient(135deg,#1a202c,#2d3748);color:#fff;padding:20px 24px}
  .header h1{font-size:22px;font-weight:700}
  .header p{color:#a0aec0;font-size:13px;margin-top:4px}
  .stats{display:flex;gap:20px;padding:14px 24px;background:#2d3748;border-top:1px solid #4a5568;flex-wrap:wrap;align-items:center}
  .stat{display:flex;flex-direction:column;align-items:center;gap:1px}
  .stat-num{font-size:22px;font-weight:800;color:#fff}
  .stat-label{font-size:11px;color:#a0aec0}
  .stat-tw .stat-num{color:#fc8181} .stat-us .stat-num{color:#63b3ed}
  .stat-jp .stat-num{color:#f6ad55} .stat-kr .stat-num{color:#68d391}
  .sep{width:1px;height:36px;background:#4a5568}
  .controls{padding:12px 24px;background:#fff;border-bottom:1px solid var(--border);
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:10;
    box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .filter-group{display:flex;gap:6px}
  .btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;
    color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
  .btn:hover{border-color:#a0aec0;color:var(--text)}
  .btn.active{color:#fff;border-color:transparent}
  .btn[data-f="ALL"].active{background:var(--text)}
  .btn[data-f="TW"].active{background:var(--tw)}
  .btn[data-f="US"].active{background:var(--us)}
  .btn[data-f="JP"].active{background:var(--jp)}
  .btn[data-f="KR"].active{background:var(--kr)}
  .search-wrap{position:relative;margin-left:auto}
  .search-wrap input{padding:6px 12px 6px 32px;border:1.5px solid var(--border);border-radius:20px;
    font-size:13px;outline:none;width:220px}
  .search-wrap input:focus{border-color:#63b3ed}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .ref-btn{padding:6px 16px;border-radius:20px;border:none;background:#3182ce;color:#fff;
    cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
  .ref-btn:hover{background:#2b6cb0} .ref-btn:disabled{background:#90cdf4;cursor:not-allowed}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
  .bar{padding:7px 24px;font-size:12px;display:flex;align-items:center;gap:8px}
  .bar.info{background:#ebf8ff;color:#2b6cb0;border-bottom:1px solid #bee3f8}
  .bar.warn{background:#fffbeb;color:#b7791f;border-bottom:1px solid #feebc8}
  .bar.ok{background:#f0fff4;color:#276749;border-bottom:1px solid #c6f6d5}
  .bar.hidden{display:none}
  .count{font-size:12px;color:var(--muted);padding:8px 24px 4px}
  .table-wrap{padding:8px 24px 32px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;
    box-shadow:0 1px 4px rgba(0,0,0,.08)}
  th{background:#f7fafc;padding:10px 14px;text-align:left;font-size:11px;font-weight:600;
    color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
    border-bottom:2px solid var(--border);white-space:nowrap}
  td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#f7fafc}
  tr.tw-row{cursor:pointer}
  tr.tw-row:hover td{background:#ebf8ff}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;color:#fff}
  .badge-TW{background:var(--tw)} .badge-US{background:var(--us)}
  .badge-JP{background:var(--jp)} .badge-KR{background:var(--kr)}
  .co-name{font-weight:600;font-size:13.5px}
  .co-en{color:var(--muted);font-size:12px;margin-top:1px}
  .co-loc{color:#a0aec0;font-size:11px;margin-top:2px}
  .ticker-plain{font-family:'SF Mono',Consolas,monospace;font-weight:600;color:#2d3748;font-size:13px}
  .price-cell{font-family:'SF Mono',Consolas,monospace}
  .pv{font-size:15px;font-weight:700}
  .pc{font-size:11px;color:var(--muted);margin-left:2px}
  .ch{font-size:12px;margin-top:2px}
  .up{color:#38a169} .dn{color:#e53e3e}
  .ld{color:#a0aec0;font-style:italic;font-size:12px}
  .ep{color:#e53e3e;font-size:12px}
  .prod{max-width:260px;color:var(--muted);font-size:12px;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .no-results{text-align:center;padding:60px;color:var(--muted);display:none}
  .no-results .ic{font-size:40px;margin-bottom:12px}
  th.sortable{cursor:pointer;user-select:none}
  th.sortable:hover{color:var(--text);background:#edf2f7}
  th.sort-asc::after{content:' \25B2';color:var(--text)}
  th.sort-desc::after{content:' \25BC';color:var(--text)}
  .auto-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);
    background:#fff;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
  .auto-btn.on{background:#f0fff4;border-color:#68d391;color:#276749;font-weight:600}
  .tb-rec{display:inline-block;padding:2px 7px;border-radius:9px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap}
  .tb-rec-strong_buy{background:#276749} .tb-rec-buy{background:#38a169}
  .tb-rec-hold,.tb-rec-none{background:#718096} .tb-rec-sell{background:#c53030}
  .tb-rec-strong_sell{background:#742a2a}
  .upside-pos{color:#38a169;font-weight:600} .upside-neg{color:#e53e3e;font-weight:600}

  /* ── Drawer ── */
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none}
  #overlay.show{display:block}
  #drawer{position:fixed;top:0;right:0;width:500px;max-width:100vw;height:100vh;
    background:#fff;z-index:201;transform:translateX(100%);transition:transform .25s ease;
    display:flex;flex-direction:column;box-shadow:-4px 0 28px rgba(0,0,0,.18)}
  #drawer.open{transform:translateX(0)}
  .d-hd{display:flex;justify-content:space-between;align-items:flex-start;
    padding:16px 20px;border-bottom:1px solid var(--border);background:#f7fafc;flex-shrink:0}
  .d-name{font-size:18px;font-weight:700;color:var(--text)}
  .d-price{font-size:13px;color:var(--muted);margin-top:5px;font-family:'SF Mono',Consolas,monospace}
  .d-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);
    padding:2px 8px;border-radius:6px;line-height:1}
  .d-close:hover{background:var(--border);color:var(--text)}
  .d-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
  .d-tab{flex:1;padding:11px 6px;border:none;background:none;cursor:pointer;font-size:13px;
    font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s}
  .d-tab:hover{color:var(--text)}
  .d-tab.active{color:#3182ce;border-bottom-color:#3182ce;font-weight:600}
  .d-body{flex:1;overflow-y:auto;padding:16px 20px}
  .d-body.hidden{display:none}
  .d-loading{color:var(--muted);font-size:13px;padding:30px 0;text-align:center}

  .d-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;
    font-family:'SF Mono',Consolas,monospace;font-size:12px}

  .d-table tr:last-child td{border-bottom:none}
  .pos{color:#38a169;font-weight:600} .neg{color:#e53e3e;font-weight:600}

    padding:11px 0;border-bottom:1px solid var(--border)}
  .d-arow:last-child{border-bottom:none}

  .rec-hold{background:#b7791f} .rec-none{background:#718096}

</style>
</head>

const CUR   = {TW:'TWD', US:'USD', JP:'JPY', KR:'KRW'};
let curFilter = 'ALL', priceData = {}, sortCol = 'change', sortDir = -1, autoTimer = null;

// ---------- Multi-proxy fetch ----------
const PROXIES = [
  url => 'https://corsproxy.io/?' + encodeURIComponent(url),
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
];

async function proxyFetch(url, timeoutMs = 9000) {
  for (const mkProxy of PROXIES) {
    try {
      const r = await fetch(mkProxy(url), {signal: AbortSignal.timeout(timeoutMs)});
      if (r.ok) return r;
    } catch(e) {}
  }
  return null;
}

// Taiwan: TWSE official API
async function fetchTW(tickers) {
  const parts = tickers.map(c => {
    const code = c.ticker.replace(/\.(TW|TWO)$/i, '');
    return (c.twx === 'otc' ? 'otc_' : 'tse_') + code + '.tw';
  });
  const url = 'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=' + parts.join('|') + '&json=1&delay=0';
  try {
    const r = await proxyFetch(url, 12000);
    if (!r) return;
    const j = await r.json();
    (j?.msgArray || []).forEach(item => {
      const priceStr = (item.z && item.z !== '-') ? item.z : item.y;
      const price = parseFloat(priceStr);
      const prev  = parseFloat(item.y);
      if (!isNaN(price) && !isNaN(prev)) {
        const change = ((price - prev) / prev) * 100;
        priceData[item.c + '.TW']  = {price, change, currency: 'TWD'};
        priceData[item.c + '.TWO'] = {price, change, currency: 'TWD'};
      }
    });
  } catch(e) {}
}

async function fetchStooq(ticker, market) {
  let sym;
  if (market === 'US') sym = ticker.toLowerCase() + '.us';
  else if (market === 'JP') sym = ticker.replace('.T','') + '.jp';
  else return null;
  const url = 'https://stooq.com/q/l/?s=' + sym + '&f=sd2ohlcv&h&e=csv';
  try {
    const r = await proxyFetch(url);
    if (!r) return null;
    const txt = await r.text();
    const lines = txt.trim().split('\n');
    if (lines.length < 2) return null;
    const cols = lines[1].split(',');
    const price = parseFloat(cols[5]);
    const open  = parseFloat(cols[2]);
    if (isNaN(price)) return null;
    const change = !isNaN(open) && open > 0 ? ((price - open) / open * 100) : null;
    return {price, change, currency: CUR[market]};
  } catch(e) { return null; }
}

async function fetchYF(ticker) {
  const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + ticker + '?interval=1d&range=1d';
  try {
    const r = await proxyFetch(url);
    if (!r) return null;
    const j = await r.json();
    const meta = j?.chart?.result?.[0]?.meta;
    if (!meta) return null;
    const price  = meta.regularMarketPrice;
    const prev   = meta.chartPreviousClose || meta.previousClose;
    const change = (prev && prev > 0) ? ((price - prev) / prev * 100) : null;
    return {price, change, currency: meta.currency || 'KRW'};
  } catch(e) { return null; }
}

async function fetchAll() {
  const btn = document.getElementById('refBtn');
  const ico = document.getElementById('refIco');
  const bar = document.getElementById('bar');
  btn.disabled = true;
  ico.innerHTML = '<span class="spin"></span>';
  bar.className = 'bar info';
  bar.textContent = '\u6b63\u5728\u66f4\u65b0\u80a1\u50f9\uff0c\u8acb\u7a0d\u5019\u2026';

  COMPANIES.forEach(c => {
    const el = document.getElementById('p_' + cellId(c.ticker));
    if (el) el.innerHTML = '<span class="ld">\u8f09\u5165\u4e2d\u2026</span>';
  });

  let ok = 0, fail = 0;

  const twCos = COMPANIES.filter(c => c.market === 'TW');
  await fetchTW(twCos);
  twCos.forEach(c => {
    if (priceData[c.ticker]) { ok++; } else { fail++; }
    updateCell(c.ticker);
  });

  const usCos = COMPANIES.filter(c => c.market === 'US');
  for (let i = 0; i < usCos.length; i += 4) {
    await Promise.all(usCos.slice(i, i+4).map(async c => {
      const d = await fetchStooq(c.ticker, 'US');
      if (d) { priceData[c.ticker] = d; ok++; } else { fail++; }
      updateCell(c.ticker);
    }));
    if (i + 4 < usCos.length) await delay(300);
  }

  const jpCos = COMPANIES.filter(c => c.market === 'JP');
  await Promise.all(jpCos.map(async c => {
    const d = await fetchStooq(c.ticker, 'JP');
    if (d) { priceData[c.ticker] = d; ok++; } else { fail++; }
    updateCell(c.ticker);
  }));

  const krCos = COMPANIES.filter(c => c.market === 'KR');
  for (const c of krCos) {
    const d = await fetchYF(c.ticker);
    if (d) { priceData[c.ticker] = d; ok++; } else { fail++; }
    updateCell(c.ticker);
    await delay(200);
  }

  btn.disabled = false;
  ico.textContent = '\u21BB';
  const now = new Date().toLocaleTimeString('zh-TW');
  bar.className = fail === 0 ? 'bar ok' : 'bar warn';
  bar.textContent = fail === 0
    ? '\u2705 \u5168\u90e8\u66f4\u65b0\u5b8c\u6210\uff08' + ok + ' \u652f\uff09\uff5c\u6700\u5f8c\u66f4\u65b0\uff1a' + now
    : '\u26A0\uFE0F \u6210\u529f ' + ok + ' \u652f\uff0c' + fail + ' \u652f\u7121\u6cd5\u53d6\u5f97\uff5c\u66f4\u65b0\uff1a' + now;

  // Refresh drawer price if open
  if (drawerCo) {
    const d = priceData[drawerCo.ticker];
    if (d) document.getElementById('d-price').textContent = drawerPriceTxt(d);
  }
  render();
}

function toggleAuto() {
  const btn = document.getElementById('autoBtn');
  if (autoTimer) {
    clearInterval(autoTimer); autoTimer = null;
    btn.classList.remove('on');
    btn.textContent = '\u23F1 \u81ea\u52d5\u66f4\u65b0';
  } else {
    autoTimer = setInterval(fetchAll, 60000);
    btn.classList.add('on');
    btn.textContent = '\u23F1 \u81ea\u52d5\u66f4\u65b0 (60s)';
  }
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function cellId(ticker) { return ticker.replace(/[^a-zA-Z0-9]/g, '_'); }

function fmtPrice(price, cur) {
  if (cur === 'KRW') return price.toLocaleString('ko-KR', {maximumFractionDigits:0});
  if (cur === 'JPY') return price.toLocaleString('ja-JP', {maximumFractionDigits:0});
  if (cur === 'TWD') return price.toLocaleString('zh-TW', {minimumFractionDigits:2, maximumFractionDigits:2});
  return price.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function updateCell(ticker) {
  const d = priceData[ticker];
  const el = document.getElementById('p_' + cellId(ticker));
  if (!el || !d) return;
  if (d.change != null) {
    const sign = d.change >= 0 ? '+' : '';
    const cls  = d.change >= 0 ? 'up' : 'dn';
    const arr  = d.change >= 0 ? '\u25B2' : '\u25BC';
    el.innerHTML = '<span class="ch ' + cls + '" style="font-size:13px">' + arr + ' ' + sign + d.change.toFixed(2) + '%</span>';
  } else {
    el.innerHTML = '<span style="color:var(--muted);font-size:12px">\u2014</span>';
  }
}

function sortVal(c) {
  const d = priceData[c.ticker];
  const ad = (typeof ANALYST_DATA !== 'undefined') ? ANALYST_DATA[c.ticker] : null;
  if (sortCol === 'name')     return c.name;
  if (sortCol === 'ticker')   return c.ticker.replace(/\.(TW|TWO|T|KS)$/i, '');
  if (sortCol === 'market')   return c.market;
  if (sortCol === 'industry') return c.industry;
  if (sortCol === 'price')    return d ? d.price : -Infinity;
  if (sortCol === 'change')   return d && d.change != null ? d.change : -Infinity;
  if (sortCol === 'rating')   return ad && ad.recMean != null ? ad.recMean : 99;
  if (sortCol === 'target')   return ad && ad.targetMean != null ? ad.targetMean : -Infinity;
  if (sortCol === 'upside') {
    if (ad && ad.targetMean != null && d) return (ad.targetMean - d.price) / d.price * 100;
    return -Infinity;
  }
  return 0;
}

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  let rows = COMPANIES.filter(c => {
    if (curFilter !== 'ALL' && c.market !== curFilter) return false;
    if (!q) return true;
    return c.name.toLowerCase().includes(q) || c.en.toLowerCase().includes(q) ||
           c.ticker.toLowerCase().includes(q) || c.industry.toLowerCase().includes(q);
  });

  if (sortCol) {
    rows = [...rows].sort((a, b) => {
      const va = sortVal(a), vb = sortVal(b);
      if (va === vb) return 0;
      return (va < vb ? -1 : 1) * sortDir;
    });
  }

  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });

  document.getElementById('cnt').textContent = '\u986f\u793a ' + rows.length + ' / ' + COMPANIES.length + ' \u5bb6\u5ee0\u5546';

  const noRes = document.getElementById('noRes');
  const tbody = document.getElementById('tbody');
  if (rows.length === 0) { tbody.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';

  tbody.innerHTML = rows.map(c => {
    const id = 'p_' + cellId(c.ticker);
    const d = priceData[c.ticker];
    const prod = c.products
      ? '<div class="prod">' + c.products.replace(/,/g, '\u30FB') + '</div>'
      : '<span style="color:#cbd5e0">\u2014</span>';
    const loc = c.hall ? c.hall + (c.booth ? ' \xB7 ' + c.booth : '') : '';
    let chHtml = '<span class="ep">\u2014</span>';
    if (d && d.change != null) {
      const sign = d.change >= 0 ? '+' : '';
      const cls  = d.change >= 0 ? 'up' : 'dn';
      const arr  = d.change >= 0 ? '\u25B2' : '\u25BC';
      chHtml = '<span class="ch ' + cls + '" style="font-size:13px">' + arr + ' ' + sign + d.change.toFixed(2) + '%</span>';
    } else if (d) {
      chHtml = '<span style="color:var(--muted);font-size:12px">\u2014</span>';
    } else {
      chHtml = '<span class="ld">\u8f09\u5165\u4e2d\u2026</span>';
    }
    let prHtml = '<span class="ep">\u2014</span>';
    if (d) prHtml = '<span class="pv">' + fmtPrice(d.price, d.currency) + '</span><span class="pc"> ' + d.currency + '</span>';

    const isTW = c.market === 'TW';
    const rowCls = isTW ? ' class="tw-row"' : '';
    const rowClick = isTW ? ' onclick="openDrawer(\'' + c.ticker + '\')"' : '';

    // Analyst columns (TW only)
    const ad = (typeof ANALYST_DATA !== 'undefined') ? ANALYST_DATA[c.ticker] : null;
    const recMap = {strong_buy:'\u5f37\u529b\u8cb7\u9032', buy:'\u8cb7\u9032', hold:'\u4e2d\u7acb',
                    none:'\u2014', sell:'\u8ce3\u51fa', strong_sell:'\u5f37\u529b\u8ce3\u51fa'};
    let recHtml = '<span style="color:var(--muted)">\u2014</span>';
    let targetHtml = '<span style="color:var(--muted)">\u2014</span>';
    let upsideHtml = '<span style="color:var(--muted)">\u2014</span>';
    if (ad && !ad.error) {
      const rec = ad.recKey || 'none';
      if (rec !== 'none') {
        recHtml = '<span class="tb-rec tb-rec-' + rec + '">' + (recMap[rec] || rec) + '</span>';
      }
      if (ad.targetMean != null) {
        targetHtml = '<span class="price-cell" style="font-size:12px;font-family:\'SF Mono\',Consolas,monospace">NT$' + ad.targetMean.toFixed(1) + '</span>';
        if (d && d.price) {
          const pct = (ad.targetMean - d.price) / d.price * 100;
          const cls = pct >= 0 ? 'upside-pos' : 'upside-neg';
          upsideHtml = '<span class="' + cls + '">' + (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%</span>';
        }
      }
    }

    return '<tr' + rowCls + rowClick + '>' +
      '<td><div class="co-name">' + c.name + '</div>' +
           '<div class="co-en">' + c.en + '</div>' +
           (loc ? '<div class="co-loc">' + loc + '</div>' : '') + '</td>' +
      '<td><span class="ticker-plain">' + c.ticker.replace(/\.(TW|TWO|T|KS)$/i, '') + '</span></td>' +
      '<td><span class="badge badge-' + c.market + '">' + MNAMES[c.market] + '</span></td>' +
      '<td class="price-cell" id="' + id + '">' + chHtml + '</td>' +
      '<td class="price-cell">' + prHtml + '</td>' +
      '<td style="text-align:center">' + recHtml + '</td>' +
      '<td style="text-align:right">' + targetHtml + '</td>' +
      '<td style="text-align:right">' + upsideHtml + '</td>' +
      '<td>' + c.industry + '</td>' +
      '<td>' + prod + '</td>' +
      '<td style="color:var(--muted);font-size:12px;white-space:nowrap">' + (c.booth || '\u2014') + '</td>' +
      '</tr>';
  }).join('');
}

document.getElementById('tbl').addEventListener('click', e => {

    sortDir = ['change','price','upside','target'].includes(col) ? -1 : 1;

// Drawer logic
// ════════════════════════════════════════
let drawerCo = null, klineChart = null, tabLoaded = {};

function drawerPriceTxt(d) {
  if (!d) return '';
  const sign = d.change >= 0 ? '+' : '';
  const arr  = d.change >= 0 ? '\u25B2' : '\u25BC';
  return fmtPrice(d.price, d.currency) + ' ' + d.currency +
    (d.change != null ? '  ' + arr + ' ' + sign + d.change.toFixed(2) + '%' : '');
}

function openDrawer(ticker) {
  const c = COMPANIES.find(x => x.ticker === ticker);
  if (!c) return;
  drawerCo = c;
  tabLoaded = {};

  const code = ticker.replace(/\.(TW|TWO)$/i, '');
  document.getElementById('d-name').textContent = c.name + '\u3000(' + code + ')';
  const d = priceData[ticker];
  document.getElementById('d-price').textContent = d ? drawerPriceTxt(d) : ticker;

  // Reset to first tab
  document.querySelectorAll('.d-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.d-tab[data-tab="kline"]').classList.add('active');
  document.querySelectorAll('.d-body').forEach(t => t.classList.add('hidden'));
  document.getElementById('tc-kline').classList.remove('hidden');

  document.getElementById('overlay').classList.add('show');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';

  loadKLine(c);
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow = '';
  drawerCo = null;
  if (klineChart) { klineChart.destroy(); klineChart = null; }
}

function switchTab(btn) {
  if (!drawerCo) return;
  document.querySelectorAll('.d-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const tab = btn.dataset.tab;
  document.querySelectorAll('.d-body').forEach(t => t.classList.add('hidden'));
  document.getElementById('tc-' + tab).classList.remove('hidden');
  if (tabLoaded[tab]) return;
  tabLoaded[tab] = true;
  const code = drawerCo.ticker.replace(/\.(TW|TWO)$/i, '');
  if (tab === 'kline') loadKLine(drawerCo);
  else if (tab === 'inst') loadInstitutional(code, drawerCo);
  else if (tab === 'div') loadDividend(code, drawerCo);
  else if (tab === 'analyst') showAnalyst(drawerCo.ticker);
}

// ── K-line ────────────────────────────────────────────────────
async function loadKLine(c) {
  const code = c.ticker.replace(/\.(TW|TWO)$/i, '');
  const container = document.getElementById('kline-chart');
  container.innerHTML = '<div class="d-loading">\u8f09\u5165K\u7dda\u5716\u4e2d\u2026</div>';
  if (klineChart) { klineChart.destroy(); klineChart = null; }
  tabLoaded['kline'] = true;

  let allData = [];

  // Primary: Yahoo Finance v8 — works for both TSE (.TW) and OTC (.TWO)
  try {
    const yfUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/' + c.ticker + '?interval=1d&range=6mo';
    const r = await proxyFetch(yfUrl, 14000);
    if (r) {
      const j = await r.json();
      const result = j?.chart?.result?.[0];
      if (result) {
        const ts = result.timestamp || [];
        const q  = result.indicators?.quote?.[0] || {};
        for (let i = 0; i < ts.length; i++) {
          const o = q.open?.[i], h = q.high?.[i], l = q.low?.[i], cl = q.close?.[i];
          if ([o,h,l,cl].every(v => v != null && !isNaN(v)))
            allData.push({x: ts[i] * 1000, y: [o, h, l, cl]});
        }
      }
    }
  } catch(e) {}

  // Fallback: TWSE STOCK_DAY (TSE only) if Yahoo Finance failed
  if (allData.length === 0 && c.twx !== 'otc') {
    const now = new Date();
    const months = [];
    for (let i = 4; i >= 0; i--) months.push(new Date(now.getFullYear(), now.getMonth()-i, 1));
    const fbData = (await Promise.all(months.map(async mDate => {
      const y = mDate.getFullYear(), m = String(mDate.getMonth()+1).padStart(2,'0');
      const rows = [];
      try {
        const url = 'https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=' + y + m + '01&stockNo=' + code;
        const r = await proxyFetch(url, 12000);
        if (!r) return rows;
        const j = await r.json();
        if (j.stat !== 'OK') return rows;
        for (const row of (j.data || [])) {
          const parts = (row[0]||'').split('/');
          if (parts.length < 3) continue;
          const date = new Date(parseInt(parts[0])+1911, parseInt(parts[1])-1, parseInt(parts[2]));
          const o = parseFloat((row[3]||'').replace(/,/g,'')), h = parseFloat((row[4]||'').replace(/,/g,''));
          const l = parseFloat((row[5]||'').replace(/,/g,'')), cl = parseFloat((row[6]||'').replace(/,/g,''));
          if ([o,h,l,cl].every(v=>!isNaN(v))) rows.push({x:date.getTime(), y:[o,h,l,cl]});
        }
      } catch(e) {}
      return rows;
    }))).flat();
    allData = fbData;
  }

  allData.sort((a, b) => a.x - b.x);

  if (allData.length === 0) {
    container.innerHTML = '<div class="d-empty">\u26A0\uFE0F \u7121\u6cd5\u53d6\u5f97K\u7dda\u8cc7\u6599</div>';
    return;
  }

  container.innerHTML = '';
  klineChart = new ApexCharts(container, {
    chart: {type:'candlestick', height:290, toolbar:{show:true}, animations:{enabled:false}},
    series: [{data: allData}],
    xaxis: {type:'datetime', labels:{format:'MM/dd', style:{fontSize:'11px'}}},
    yaxis: {tooltip:{enabled:true}, labels:{formatter:v=>v.toFixed(1), style:{fontSize:'11px'}}},
    plotOptions: {candlestick:{colors:{upward:'#e53e3e', downward:'#38a169'}}},
    tooltip: {x:{format:'yyyy/MM/dd'}},
    grid: {borderColor:'#e2e8f0'},
  });
  klineChart.render();
}

// ── 三大法人 ──────────────────────────────────────────────────
async function loadInstitutional(code, c) {
  const el = document.getElementById('tc-inst');
  el.innerHTML = '<div class="d-loading">\u8f09\u5165\u4e09\u5927\u6cd5\u4eba\u8cc7\u6599\u4e2d\u2026</div>';

  const results = [];
  const cur = new Date();
  let tries = 0;
  while (results.length < 5 && tries < 20) {
    cur.setDate(cur.getDate() - 1);
    if (cur.getDay() === 0 || cur.getDay() === 6) { tries++; continue; }
    const y = cur.getFullYear();
    const m = String(cur.getMonth()+1).padStart(2,'0');
    const d = String(cur.getDate()).padStart(2,'0');
    const dateStr = y + m + d;
    const displayDate = y + '/' + m + '/' + d;
    try {
      const url = 'https://www.twse.com.tw/fund/T86?response=json&date=' + dateStr + '&selectType=ALLBUT0999';
      const r = await proxyFetch(url, 12000);
      if (!r) { tries++; continue; }
      const j = await r.json();
      if (j.stat !== 'OK' || !Array.isArray(j.data)) { tries++; continue; }
      const row = j.data.find(row => row[0] === code);
      if (row) {
        // T86 columns: [0]code [1]name [2]fgn_buy [3]fgn_sell [4]fgn_net
        // [5]fgn_prop_buy [6]fgn_prop_sell [7]fgn_prop_net [8]trust_buy [9]trust_sell
        // [10]trust_net [11]dealer_net [12..17]dealer sub [18]total
        const pInt = s => parseInt((s||'0').replace(/,/g,'').replace(/\+/g,'')) || 0;
        results.push({
          date: displayDate,
          foreign: pInt(row[4]),
          trust:   pInt(row[10]),
          dealer:  pInt(row[11]),
          total:   pInt(row[18]),
        });
      }
    } catch(e) {}
    tries++;
    await delay(250);
  }

  if (results.length === 0) {
    el.innerHTML = '<div class="d-empty">\u26A0\uFE0F \u7121\u6cd5\u53d6\u5f97\u4e09\u5927\u6cd5\u4eba\u8cc7\u6599<br><small>\u53ef\u80fd\u70ba\u975e\u4ea4\u6613\u65e5</small></div>';
    return;
  }

  const fmt = n => {
    if (isNaN(n)) return '\u2014';
    const cls = n >= 0 ? 'pos' : 'neg';
    const sign = n >= 0 ? '+' : '';
    return '<span class="' + cls + '">' + sign + n.toLocaleString() + '</span>';
  };

  el.innerHTML = '<p style="font-size:11px;color:var(--muted);margin-bottom:8px">\u55ae\u4f4d\uff1a\u80a1</p>' +
    '<table class="d-table"><thead><tr>' +
    '<th>\u65e5\u671f</th><th>\u5916\u8cc7\u8cb7\u8ce3\u8d85</th><th>\u6295\u4fe1\u8cb7\u8ce3\u8d85</th><th>\u81ea\u71df\u8cb7\u8ce3\u8d85</th><th>\u4e09\u5927\u5408\u8a08</th>' +
    '</tr></thead><tbody>' +
    results.map(r => '<tr><td>' + r.date + '</td><td>' + fmt(r.foreign) + '</td><td>' +
      fmt(r.trust) + '</td><td>' + fmt(r.dealer) + '</td><td>' + fmt(r.total) + '</td></tr>').join('') +
    '</tbody></table>';
}

// ── 近五年股息 ───────────────────────────────────────────────
async function loadDividend(code, c) {
  const el = document.getElementById('tc-div');
  el.innerHTML = '<div class="d-loading">\u8f09\u5165\u80a1\u606f\u8cc7\u6599\u4e2d\u2026</div>';

  const suffix = c.twx === 'otc' ? '.TWO' : '.TW';
  const ticker = code + suffix;
  const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + ticker + '?interval=3mo&range=5y&events=div';
  try {
    const r = await proxyFetch(url, 14000);
    if (!r) throw new Error('proxy failed');
    const j = await r.json();
    const divEvents = j?.chart?.result?.[0]?.events?.dividends;
    if (!divEvents || Object.keys(divEvents).length === 0) {
      el.innerHTML = '<div class="d-empty">\u66ab\u7121\u80a1\u606f\u8cc7\u6599<br><small>\u8a72\u80a1\u53ef\u80fd\u672a\u767c\u653e\u73fe\u91d1\u80a1\u606f</small></div>';
      return;
    }
    // Sort by date descending
    const divs = Object.values(divEvents).sort((a, b) => b.date - a.date);
    // Group by ROC year
    const byYear = {};
    for (const dv of divs) {
      const d = new Date(dv.date * 1000);
      const rocYear = d.getFullYear() - 1911;
      if (!byYear[rocYear]) byYear[rocYear] = {roc: rocYear, dates: [], total: 0};
      byYear[rocYear].dates.push(d.toLocaleDateString('zh-TW'));
      byYear[rocYear].total += dv.amount;
    }
    const years = Object.values(byYear).sort((a, b) => b.roc - a.roc).slice(0, 7);
    el.innerHTML = '<p style="font-size:11px;color:var(--muted);margin-bottom:8px">\u8cc7\u6599\u4f86\u6e90\uff1aYahoo Finance\uff0c\u55ae\u4f4d\uff1aTWD</p>' +
      '<table class="d-table"><thead><tr>' +
      '<th>\u80a1\u5229\u5e74\u5ea6</th><th>\u767c\u653e\u65e5\u671f</th><th>\u73fe\u91d1\u80a1\u606f\uff08\u5143\uff09</th>' +
      '</tr></thead><tbody>' +
      years.map(y => '<tr><td>' + y.roc + '\u5e74</td><td style="font-size:11px">' +
        y.dates.slice(0,2).join('<br>') + '</td><td>' + y.total.toFixed(2) + '</td></tr>').join('') +
      '</tbody></table>';
  } catch(e) {
    el.innerHTML = '<div class="d-empty">\u26A0\uFE0F \u7121\u6cd5\u53d6\u5f97\u80a1\u606f\u8cc7\u6599</div>';
  }
}

// ── 分析師評等 ───────────────────────────────────────────────
function showAnalyst(ticker) {
  const el = document.getElementById('tc-analyst');
  const data = (typeof ANALYST_DATA !== 'undefined') ? ANALYST_DATA[ticker] : null;

  if (!data || data.error) {
    el.innerHTML = '<div class="d-empty">\u66ab\u7121\u5206\u6790\u5e2b\u8a55\u7b49\u8cc7\u6599<br>' +
      '<small>' + (data?.error || '\u672a\u6536\u9304') + '</small></div>';
    return;
  }

  const recMap = {strong_buy:'\u5f37\u529b\u8cb7\u9032', buy:'\u8cb7\u9032',
    hold:'\u4e2d\u7acb', none:'\u4e2d\u7acb/\u7121\u8a55\u7b49',
    sell:'\u8ce3\u51fa', strong_sell:'\u5f37\u529b\u8ce3\u51fa'};
  const rec = data.recKey || 'none';
  const d = priceData[ticker];
  const currentPrice = d ? d.price : null;

  let upside = '';
  if (currentPrice && data.targetMean) {
    const pct = ((data.targetMean - currentPrice) / currentPrice * 100).toFixed(1);
    const cls = pct >= 0 ? 'pos' : 'neg';
    upside = ' <span class="' + cls + '">(' + (pct >= 0 ? '+' : '') + pct + '%)</span>';
  }

  el.innerHTML = '<div class="d-analyst">' +
    '<div class="d-arow"><span class="d-alabel">\u8a55\u7b49</span>' +
    '<span class="rec-badge rec-' + rec + '">' + (recMap[rec] || rec) + '</span></div>' +
    (data.targetMean != null ?
      '<div class="d-arow"><span class="d-alabel">\u5e73\u5747\u76ee\u6a19\u50f9</span>' +
      '<span class="d-aval">NT$' + data.targetMean.toFixed(1) + upside + '</span></div>' : '') +
    (data.targetHigh != null ?
      '<div class="d-arow"><span class="d-alabel">\u6700\u9ad8\u76ee\u6a19\u50f9</span>' +
      '<span class="d-aval">NT$' + data.targetHigh.toFixed(1) + '</span></div>' : '') +
    (data.targetLow != null ?
      '<div class="d-arow"><span class="d-alabel">\u6700\u4f4e\u76ee\u6a19\u50f9</span>' +
      '<span class="d-aval">NT$' + data.targetLow.toFixed(1) + '</span></div>' : '') +
    (data.numAnalysts != null ?
      '<div class="d-arow"><span class="d-alabel">\u5206\u6790\u5e2b\u4eba\u6578</span>' +
      '<span class="d-aval">' + data.numAnalysts + ' \u4eba</span></div>' : '') +
    (data.recMean != null ?
      '<div class="d-arow"><span class="d-alabel">\u8a55\u7b49\u5747\u5206 (1=\u5f37\u529b\u8cb7\u9032, 5=\u5f37\u529b\u8ce3\u51fa)</span>' +
      '<span class="d-aval">' + data.recMean.toFixed(2) + '</span></div>' : '') +
    '</div>';
}

fetchAll();
