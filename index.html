<style>

  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  .header{background:linear-gradient(135deg,#1a202c,#2d3748);color:#fff;padding:20px 24px}
  .header h1{font-size:22px;font-weight:700}
  .header p{color:#a0aec0;font-size:13px;margin-top:4px}
  .stats{display:flex;gap:20px;padding:14px 24px;background:#2d3748;border-top:1px solid #4a5568;flex-wrap:wrap;align-items:center}
  .stat{display:flex;flex-direction:column;align-items:center;gap:1px}
  .stat-num{font-size:22px;font-weight:800;color:#fff}
  .stat-label{font-size:11px;color:#a0aec0}
  .stat-tw .stat-num{color:#fc8181} .stat-us .stat-num{color:#63b3ed}
  .stat-jp .stat-num{color:#f6ad55} .stat-kr .stat-num{color:#68d391}
  .sep{width:1px;height:36px;background:#4a5568}
  .controls{padding:12px 24px;background:#fff;border-bottom:1px solid var(--border);
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:10;
    box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .filter-group{display:flex;gap:6px}
  .btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;
    color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
  .btn:hover{border-color:#a0aec0;color:var(--text)}
  .btn.active{color:#fff;border-color:transparent}
  .btn[data-f="ALL"].active{background:var(--text)}
  .btn[data-f="TW"].active{background:var(--tw)}
  .btn[data-f="US"].active{background:var(--us)}
  .btn[data-f="JP"].active{background:var(--jp)}
  .btn[data-f="KR"].active{background:var(--kr)}
  .search-wrap{position:relative;margin-left:auto}
  .search-wrap input{padding:6px 12px 6px 32px;border:1.5px solid var(--border);border-radius:20px;
    font-size:13px;outline:none;width:220px}
  .search-wrap input:focus{border-color:#63b3ed}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .ref-btn{padding:6px 16px;border-radius:20px;border:none;background:#3182ce;color:#fff;
    cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
  .ref-btn:hover{background:#2b6cb0} .ref-btn:disabled{background:#90cdf4;cursor:not-allowed}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
  .bar{padding:7px 24px;font-size:12px;display:flex;align-items:center;gap:8px}
  .bar.info{background:#ebf8ff;color:#2b6cb0;border-bottom:1px solid #bee3f8}
  .bar.warn{background:#fffbeb;color:#b7791f;border-bottom:1px solid #feebc8}
  .bar.ok{background:#f0fff4;color:#276749;border-bottom:1px solid #c6f6d5}
  .bar.hidden{display:none}
  .count{font-size:12px;color:var(--muted);padding:8px 24px 4px}
  .table-wrap{padding:8px 24px 32px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;
    box-shadow:0 1px 4px rgba(0,0,0,.08)}
  th{background:#f7fafc;padding:10px 14px;text-align:left;font-size:11px;font-weight:600;
    color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
    border-bottom:2px solid var(--border);white-space:nowrap}
  td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#f7fafc}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;color:#fff}
  .badge-TW{background:var(--tw)} .badge-US{background:var(--us)}
  .badge-JP{background:var(--jp)} .badge-KR{background:var(--kr)}
  .co-name{font-weight:600;font-size:13.5px}
  .co-en{color:var(--muted);font-size:12px;margin-top:1px}
  .co-loc{color:#a0aec0;font-size:11px;margin-top:2px}
  .ticker-plain{font-family:'SF Mono',Consolas,monospace;font-weight:600;color:#2d3748;font-size:13px}
  .price-cell{font-family:'SF Mono',Consolas,monospace}
  .pv{font-size:15px;font-weight:700}
  .pc{font-size:11px;color:var(--muted);margin-left:2px}
  .ch{font-size:12px;margin-top:2px}
  .up{color:#38a169} .dn{color:#e53e3e}
  .ld{color:#a0aec0;font-style:italic;font-size:12px}
  .ep{color:#e53e3e;font-size:12px}

    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .no-results{text-align:center;padding:60px;color:var(--muted);display:none}
  .no-results .ic{font-size:40px;margin-bottom:12px}
  th.sortable{cursor:pointer;user-select:none}
  th.sortable:hover{color:var(--text);background:#edf2f7}
  th.sort-asc::after{content:' \25B2';color:var(--text)}
  th.sort-desc::after{content:' \25BC';color:var(--text)}
  .auto-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);
    background:#fff;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}

</style>
</head>

</div>

<div class="bar info hidden" id="bar"></div>
<div class="count" id="cnt"></div>

<div class="table-wrap">

  </table>

</div>

// Init stats

['TW','US','JP','KR'].forEach(m => {
  document.getElementById('s'+m).textContent = COMPANIES.filter(c=>c.market===m).length;

// ---------- Multi-proxy fetch ----------
const PROXIES = [
  url => 'https://corsproxy.io/?' + encodeURIComponent(url),
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
];

async function proxyFetch(url, timeoutMs = 9000) {
  for (const mkProxy of PROXIES) {
    try {
      const r = await fetch(mkProxy(url), {signal: AbortSignal.timeout(timeoutMs)});
      if (r.ok) return r;
    } catch(e) {}
  }
  return null;
}

// Taiwan: TWSE official API (real-time)
async function fetchTW(tickers) {
  const parts = tickers.map(c => {
    const code = c.ticker.replace(/\.(TW|TWO)$/i, '');
    return (c.twx === 'otc' ? 'otc_' : 'tse_') + code + '.tw';
  });
  const url = 'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=' + parts.join('|') + '&json=1&delay=0';
  try {
    const r = await proxyFetch(url, 12000);
    if (!r) return;
    const j = await r.json();
    const items = j?.msgArray || [];
    items.forEach(item => {
      const priceStr = (item.z && item.z !== '-') ? item.z : item.y;
      const price = parseFloat(priceStr);
      const prev  = parseFloat(item.y);
      if (!isNaN(price) && !isNaN(prev)) {
        const change = ((price - prev) / prev) * 100;
        priceData[item.c + '.TW']  = {price, change, currency: 'TWD'};
        priceData[item.c + '.TWO'] = {price, change, currency: 'TWD'};
      }
    });
  } catch(e) {}
}

// US/JP: Stooq CSV
async function fetchStooq(ticker, market) {
  let sym;
  if (market === 'US') sym = ticker.toLowerCase() + '.us';
  else if (market === 'JP') sym = ticker.replace('.T','') + '.jp';
  else return null;

  const url = 'https://stooq.com/q/l/?s=' + sym + '&f=sd2ohlcv&h&e=csv';
  try {
    const r = await proxyFetch(url);
    if (!r) return null;
    const txt = await r.text();
    const lines = txt.trim().split('\n');
    if (lines.length < 2) return null;
    const cols = lines[1].split(',');
    const price = parseFloat(cols[5]);
    const open  = parseFloat(cols[2]);
    if (isNaN(price)) return null;
    const change = !isNaN(open) && open > 0 ? ((price - open) / open * 100) : null;
    return {price, change, currency: CUR[market]};
  } catch(e) { return null; }
}

// KR: Yahoo Finance v8 via proxy
async function fetchYF(ticker) {
  const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + ticker + '?interval=1d&range=1d';
  try {
    const r = await proxyFetch(url);
    if (!r) return null;
    const j = await r.json();
    const meta = j?.chart?.result?.[0]?.meta;
    if (!meta) return null;
    const price  = meta.regularMarketPrice;
    const prev   = meta.chartPreviousClose || meta.previousClose;
    const change = (prev && prev > 0) ? ((price - prev) / prev * 100) : null;
    return {price, change, currency: meta.currency || 'KRW'};
  } catch(e) { return null; }
}

// ---------- Main fetch ----------
async function fetchAll() {
  const btn = document.getElementById('refBtn');
  const ico = document.getElementById('refIco');
  const bar = document.getElementById('bar');
  btn.disabled = true;
  ico.innerHTML = '<span class="spin"></span>';
  bar.className = 'bar info';
  bar.textContent = '正在更新股價，請稍候…';

  // Set loading state
  COMPANIES.forEach(c => {
    const el = document.getElementById('p_' + cellId(c.ticker));
    if (el) el.innerHTML = '<span class="ld">載入中…</span>';
  });

  let ok = 0, fail = 0;

  // 1. Taiwan batch (single request)
  const twCos = COMPANIES.filter(c => c.market === 'TW');
  await fetchTW(twCos);
  twCos.forEach(c => {
    if (priceData[c.ticker]) { ok++; } else { fail++; }
    updateCell(c.ticker);
  });

  // 2. US via Stooq (batches of 4)
  const usCos = COMPANIES.filter(c => c.market === 'US');
  for (let i = 0; i < usCos.length; i += 4) {
    await Promise.all(usCos.slice(i, i+4).map(async c => {
      const d = await fetchStooq(c.ticker, 'US');
      if (d) { priceData[c.ticker] = d; ok++; } else { fail++; }
      updateCell(c.ticker);
    }));
    if (i + 4 < usCos.length) await delay(300);
  }

  // 3. Japan via Stooq
  const jpCos = COMPANIES.filter(c => c.market === 'JP');
  await Promise.all(jpCos.map(async c => {
    const d = await fetchStooq(c.ticker, 'JP');
    if (d) { priceData[c.ticker] = d; ok++; } else { fail++; }
    updateCell(c.ticker);
  }));

  // 4. Korea via Yahoo Finance
  const krCos = COMPANIES.filter(c => c.market === 'KR');
  for (const c of krCos) {
    const d = await fetchYF(c.ticker);
    if (d) { priceData[c.ticker] = d; ok++; } else { fail++; }
    updateCell(c.ticker);
    await delay(200);
  }

  btn.disabled = false;
  ico.textContent = '\u21BB';
  const now = new Date().toLocaleTimeString('zh-TW');
  bar.className = fail === 0 ? 'bar ok' : 'bar warn';
  bar.textContent = fail === 0
    ? '\u2705 全部更新完成（' + ok + ' 支）\uFF5C最後更新：' + now
    : '\u26A0\uFE0F 成功 ' + ok + ' 支，' + fail + ' 支無法取得（休市或 API 限制）\uFF5C更新：' + now;
  render();
}

function toggleAuto() {
  const btn = document.getElementById('autoBtn');
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
    btn.classList.remove('on');
    btn.textContent = '\u23F1 自動更新';
  } else {
    autoTimer = setInterval(fetchAll, 60000);
    btn.classList.add('on');
    btn.textContent = '\u23F1 自動更新 (60s)';
  }
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function cellId(ticker) { return ticker.replace(/[^a-zA-Z0-9]/g, '_'); }

function fmtPrice(price, cur) {
  if (cur === 'KRW') return price.toLocaleString('ko-KR', {maximumFractionDigits:0});
  if (cur === 'JPY') return price.toLocaleString('ja-JP', {maximumFractionDigits:0});
  if (cur === 'TWD') return price.toLocaleString('zh-TW', {minimumFractionDigits:2, maximumFractionDigits:2});
  return price.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function priceHtml(ticker) {
  const d = priceData[ticker];
  if (!d) return '<span class="ep">—</span>';
  const sign = d.change >= 0 ? '+' : '';
  const cls  = d.change >= 0 ? 'up' : 'dn';
  const arr  = d.change >= 0 ? '\u25B2' : '\u25BC';
  return '<span class="pv">' + fmtPrice(d.price, d.currency) + '</span>' +
    '<span class="pc">' + d.currency + '</span>' +
    (d.change != null
      ? '<div class="ch ' + cls + '">' + arr + ' ' + sign + d.change.toFixed(2) + '%</div>'
      : '');
}

function updateCell(ticker) {
  // After individual update, re-render to keep sort order and both columns in sync
  // (lightweight: just update the specific change cell by id)
  const d = priceData[ticker];
  const el = document.getElementById('p_' + cellId(ticker));
  if (!el || !d) return;
  if (d.change != null) {
    const sign = d.change >= 0 ? '+' : '';
    const cls  = d.change >= 0 ? 'up' : 'dn';
    const arr  = d.change >= 0 ? '\u25B2' : '\u25BC';
    el.innerHTML = '<span class="ch ' + cls + '" style="font-size:13px">' + arr + ' ' + sign + d.change.toFixed(2) + '%</span>';
  } else {
    el.innerHTML = '<span style="color:var(--muted);font-size:12px">\u2014</span>';
  }
}

function sortVal(c) {
  const d = priceData[c.ticker];
  if (sortCol === 'name')     return c.name;
  if (sortCol === 'ticker')   return c.ticker.replace(/\.(TW|TWO|T|KS)$/i, '');
  if (sortCol === 'market')   return c.market;
  if (sortCol === 'industry') return c.industry;
  if (sortCol === 'price')    return d ? d.price : -Infinity;
  if (sortCol === 'change')   return d && d.change != null ? d.change : -Infinity;
  return 0;
}

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  let rows = COMPANIES.filter(c => {
    if (curFilter !== 'ALL' && c.market !== curFilter) return false;
    if (!q) return true;
    return c.name.toLowerCase().includes(q) || c.en.toLowerCase().includes(q) ||
           c.ticker.toLowerCase().includes(q) || c.industry.toLowerCase().includes(q);
  });

  if (sortCol) {
    rows = [...rows].sort((a, b) => {
      const va = sortVal(a), vb = sortVal(b);
      if (va === vb) return 0;
      return (va < vb ? -1 : 1) * sortDir;
    });
  }

  // Update header indicators
  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });

  document.getElementById('cnt').textContent = '顯示 ' + rows.length + ' / ' + COMPANIES.length + ' 家廠商';

  const noRes = document.getElementById('noRes');
  const tbody = document.getElementById('tbody');
  if (rows.length === 0) { tbody.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';

  tbody.innerHTML = rows.map(c => {
    const id = 'p_' + cellId(c.ticker);
    const d = priceData[c.ticker];
    const prod = c.products
      ? '<div class="prod">' + c.products.replace(/,/g, '\u30FB') + '</div>'
      : '<span style="color:#cbd5e0">—</span>';
    const loc = c.hall ? c.hall + (c.booth ? ' \xB7 ' + c.booth : '') : '';
    // Change cell
    let chHtml = '<span class="ep">\u2014</span>';
    if (d && d.change != null) {
      const sign = d.change >= 0 ? '+' : '';
      const cls  = d.change >= 0 ? 'up' : 'dn';
      const arr  = d.change >= 0 ? '\u25B2' : '\u25BC';
      chHtml = '<span class="ch ' + cls + '" style="font-size:13px">' + arr + ' ' + sign + d.change.toFixed(2) + '%</span>';
    } else if (d) {
      chHtml = '<span style="color:var(--muted);font-size:12px">—</span>';
    } else if (!d) {
      chHtml = '<span class="ld">\u8f09\u5165\u4e2d\u2026</span>';
    }
    // Price cell (no change % row, just value + currency)
    let prHtml = '<span class="ep">\u2014</span>';
    if (d) prHtml = '<span class="pv">' + fmtPrice(d.price, d.currency) + '</span><span class="pc"> ' + d.currency + '</span>';
    return '<tr>' +
      '<td><div class="co-name">' + c.name + '</div>' +
           '<div class="co-en">' + c.en + '</div>' +
           (loc ? '<div class="co-loc">' + loc + '</div>' : '') + '</td>' +
      '<td><span class="ticker-plain">' + c.ticker.replace(/\.(TW|TWO|T|KS)$/i, '') + '</span></td>' +
      '<td><span class="badge badge-' + c.market + '">' + MNAMES[c.market] + '</span></td>' +
      '<td class="price-cell" id="' + id + '">' + chHtml + '</td>' +
      '<td class="price-cell">' + prHtml + '</td>' +
      '<td>' + c.industry + '</td>' +
      '<td>' + prod + '</td>' +
      '<td style="color:var(--muted);font-size:12px;white-space:nowrap">' + (c.booth || '\u2014') + '</td>' +
      '</tr>';
  }).join('');
}

document.getElementById('tbl').addEventListener('click', e => {
  const th = e.target.closest('th[data-col]');
  if (!th) return;
  const col = th.dataset.col;
  if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = col === 'change' || col === 'price' ? -1 : 1; }
  render();
});

document.getElementById('filters').addEventListener('click', e => {
  const b = e.target.closest('[data-f]');
  if (!b) return;
  document.querySelectorAll('[data-f]').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  curFilter = b.dataset.f;
  render();
});
document.getElementById('q').addEventListener('input', render);

render();
fetchAll();
</script>
